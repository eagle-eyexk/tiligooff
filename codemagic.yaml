workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: tiligo_asc
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - code-signing
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Auto-fix project structure
        script: |
          echo "=== Fixing project structure ==="
          if [ ! -f "index.html" ]; then
            cat > index.html << 'HTMLEOF'
          <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>TiliGo</title></head><body><div id="root"></div><script type="module" src="/src/main.jsx"></script></body></html>
          HTMLEOF
          fi
          if [ -f "src/index.css" ] && [ ! -f "index.css" ]; then
            cp src/index.css index.css
          fi
          if [ -f "src/index.css" ] && [ ! -f "src/index.css" ]; then
            true
          fi
          mkdir -p src
          if [ -f "main.jsx" ] && [ ! -f "src/main.jsx" ]; then
            cp main.jsx src/main.jsx
          fi
          if [ -f "App.jsx" ] && [ ! -f "src/App.jsx" ]; then
            cp App.jsx src/App.jsx
          fi
          touch index.css
          echo "=== Structure fixed ==="
      - name: Install and build
        script: |
          npm install
          npm run build
      - name: Sync and pod install
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
          cd ios/App && pod install --repo-update && cd ../..
      - name: Install signing assets
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp signing/*.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          security create-keychain -p build123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p build123 build.keychain
          for p12 in signing/*.p12; do
            security import "$p12" -k build.keychain -P "DqUvrZUt" -T /usr/bin/codesign
          done
          security set-key-partition-list -S apple-tool:,apple: -s -k build123 build.keychain
      - name: Archive and export
        script: |
          cd ios/App
          BUILD=$(( $(date +%s) - 1700000000 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" App/Info.plist 2>/dev/null || true
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath /Users/builder/build/App.xcarchive DEVELOPMENT_TEAM=H4QUDPK7S3 CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER="TiliGo Cer" archive
          test -d /Users/builder/build/App.xcarchive || exit 1
          cat > /Users/builder/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.tiligo.tilgo</key>
                  <string>TiliGo Cer</string>
              </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive -archivePath /Users/builder/build/App.xcarchive -exportPath /Users/builder/build -exportOptionsPlist /Users/builder/ExportOptions.plist
    artifacts:
      - /Users/builder/build/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true